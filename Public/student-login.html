<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ELECTRA</title>
<link rel="stylesheet" href="../assets/css/design-system.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.login-card {
  width: 100%; max-width: 460px;
  background: var(--surface-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--r-2xl);
  padding: 40px;
  box-shadow: var(--shadow-gold);
  position: relative; overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute; top: -1px; left: 15%; right: 15%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.login-glow {
  position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, rgba(233,168,50,.08), transparent 70%);
  pointer-events: none; z-index: -1;
}
.login-tab-wrap { display:flex; gap:0; margin-bottom:28px; border-radius:var(--r-full); overflow:hidden; border:1px solid var(--border-subtle); }
.login-tab {
  flex:1; padding:10px; text-align:center; font-size:13px; font-weight:600;
  color:var(--text-muted); cursor:pointer; transition:all .25s; background:transparent; border:none;
}
.login-tab.active { background:var(--gold-glow); color:var(--gold); }
.login-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
.logo-m { width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:20px;color:var(--midnight) }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="login-glow"></div>

<div class="login-card animate-up">
  <div class="login-logo">
    <div class="logo-m">E</div>
    <div>
      <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700">ELECTRA</div>
      <div style="font-size:11px;color:var(--text-muted)">College Union Voting</div>
    </div>
    <a href="index.html" style="margin-left:auto;color:var(--text-muted);font-size:13px">← Home</a>
  </div>

  <!-- STUDENT FORM -->
  <div id="studentForm">
    <h3 style="font-family:var(--font-display);margin-bottom:6px">Student Login</h3>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px">Login with your credentials to cast your vote.</p>

    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group">
        <label class="form-label">College Code</label>
        <div class="input-group">
          <span class="input-icon">#</span>
          <input type="text" class="form-input" placeholder="Your college code" style="text-transform:uppercase">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email or Register Number</label>
        <div class="input-group">
          <span class="input-icon">🎓</span>
          <input type="text" class="form-input" placeholder="email@student.edu or RegNo">
        </div>
        <span class="form-hint">Use your official student email or registration number</span>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-input" id="stuPwd" placeholder="Your password">
          <span class="input-suffix" onclick="togglePwd('stuPwd')">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Security Code</label>
        <div class="input-group">
          <span class="input-icon">🛡️</span>
          <input type="text" class="form-input" placeholder="6-digit security code" maxlength="6" style="font-family:var(--font-mono);letter-spacing:.2em;font-size:1.1rem">
        </div>
        <span class="form-hint">Found in your login credentials card</span>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:20px"
      onclick="login('student')">
      Login &amp; Vote →
    </button>
  </div>
</div>

<script src="../assets/js/electra.js"></script>
<script>
function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Authentication is handled centrally by electra.js (window.login mapping)
</script>
</body>
</html>
